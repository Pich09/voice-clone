version: "3.8"

services:
  khmer-tts-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - KHMER_TTS_MODEL_DIR=/app/models/my_voice
      - KHMER_TTS_SPEAKER_REFS_DIR=/app/data/speaker_refs
      - KHMER_TTS_OUTPUT_DIR=/app/outputs/api
      - KHMER_TTS_MAX_TEXT_LENGTH=2000
      - KHMER_TTS_DEVICE=cuda
    volumes:
      - ./vendor/fish-speech:/app/vendor/fish-speech:ro
      - ./models:/app/models:ro
      - ./data/speaker_refs:/app/data/speaker_refs:ro
      - ./outputs/api:/app/outputs/api
      - ./outputs/logs:/app/outputs/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
