# Voice adaptation training configuration (Section 9.2)
# Consumed by scripts/12_train_fish_my_voice.sh

project: my_voice
base_checkpoint: models/khmer_base   # NOTE: adapt from the Khmer base, not the raw pretrained checkpoint
dataset_dir: data/fish/my_voice
proto_dir: data/fish/my_voice_protos
output_dir: models/my_voice

lora:
  rank: 8
  alpha: 16

training:
  max_steps: 3000
  val_check_interval: 200
  learning_rate: 1.0e-5   # much lower than base training, to avoid overfitting/forgetting Khmer pronunciation
  batch_size: 8
  warmup_steps: 100
  precision: bf16

data_targets:
  minimum_minutes: 30
  recommended_hours: [1, 3]
  strong_hours: [5, 10]

recording_requirements:
  - quiet room
  - same microphone
  - same distance
  - no fan / no music / no echo
  - natural Khmer speaking voice
  - format: WAV, 24kHz or 44.1kHz, mono

notes: |
  Purpose: adapt the Khmer base model to your voice.
  Watch for overfitting (Section 16): if voice clone sounds like you but
  pronunciation degrades, lower the learning rate further or reduce steps.
